    <!-- Right Face -->
    <path d="M 48 50 L 58 45 L 58 75 L 48 80 Z" fill="#d97706" stroke="#b45309" stroke-width="1"/>

    <!-- Bar 3 (Tall) -->
    <!-- Top Face -->
