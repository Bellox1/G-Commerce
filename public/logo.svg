    <!-- Growth Arrow -->
    <path d="M 15 65 Q 40 45 74 19" fill="none" stroke="#167e65" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="69,18 76,17 74,24" fill="#167e65"/>
  </g>

  <defs>
